name: Lean Action CI

on:
  push:
    branches-ignore:
      - main  # main is handled by blueprint.yml (build + deploy)
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
